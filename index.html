<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Membership Survey</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #6a5acd, #00bfff);
            color: #333;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #5a4fcf;
        }

        .question {
            margin-bottom: 20px;
            padding: 15px;
            background: #f3f0ff;
            border-left: 5px solid #6a5acd;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }

        .options label {
            display: block;
            margin: 5px 0;
            font-weight: normal;
            cursor: pointer;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #6a5acd;
            box-shadow: 0 0 5px #6a5acd;
        }

        .submit-btn {
            background: linear-gradient(135deg, #6a5acd, #00bfff);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            font-size: 16px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Department Membership Survey </h1>

    <form action="https://formspree.io/f/maqljjlv" method="POST">

        <!-- PERSONAL INFO -->
        <div class="question">
            <label>Full Name:</label>
            <input type="text" name="full_name" placeholder="Enter your full name" required>

            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Facebook Account:</label>
            <input type="text" name="facebook" placeholder="Your Facebook link or name">
        </div>

        <!-- Question 1 -->
        <div class="question">
            <label>1. do you want to chnage ypur department?</label>
            <div class="options">
                <label>
                    <input type="radio" name="current_member" value="yes" onchange="toggleYes()">
                    Yes
                </label>
                <input type="text" id="dept_yes" placeholder="Which department?" style="display:none;">

                <label>
                    <input type="radio" name="current_member" value="no" onchange="toggleNo()">
                    No
                </label>
                <input type="text" id="dept_no" placeholder="Write your department" style="display:none;">
            </div>
        </div>

        <!-- Question 2 -->
         <div class="question">
    <p style="color:#6a5acd; font-style:italic; margin-bottom:10px;">
        If you dont want to change your department go to question 4
    </p>
</div>
        <div class="question">
            <label>2. Why do u want to  change your department?</label>
            <div class="options">
                <label><input type="radio" name="reason_change" value="interests">Different interests</label>
                <label><input type="radio" name="reason_change" value="skills">Better skills match</label>
                <label><input type="radio" name="reason_change" value="team">Team issues</label>
                <label><input type="radio" name="reason_change" value="career">Career growth</label>
                <label><input type="radio" name="reason_change" value="other">Other</label>
                <input type="text" id="other_reason" placeholder="Specify..." style="display:none;">
            </div>
        </div>

        <!-- Question 3 -->
        <div class="question">
            <label>3. What skills can you contribute?</label>
            <textarea name="skills" rows="4" required></textarea>
        </div>

        <!-- Question 4 -->
        <div class="question">
            <label>4. Availability</label>
            <div class="options">
                <label><input type="radio" name="availability" value="full">Full-time</label>
                <label><input type="radio" name="availability" value="part">Part-time</label>
                <input type="number" id="hours" placeholder="Hours/week" style="display:none; width:150px;">
                <label><input type="radio" name="availability" value="flex">Flexible</label>
            </div>
        </div>

        <button type="submit" class="submit-btn">Submit 💙</button>
    </form>
</div>

<script>
function toggleYes() {
    document.getElementById("dept_yes").style.display = "block";
    document.getElementById("dept_no").style.display = "none";
}

function toggleNo() {
    document.getElementById("dept_no").style.display = "block";
    document.getElementById("dept_yes").style.display = "none";
}

document.querySelectorAll('input[name="reason_change"]').forEach(r => {
    r.addEventListener('change', function() {
        document.getElementById("other_reason").style.display =
            this.value === "other" ? "block" : "none";
    });
});

document.querySelectorAll('input[name="availability"]').forEach(r => {
    r.addEventListener('change', function() {
        document.getElementById("hours").style.display =
            this.value === "part" ? "inline-block" : "none";
    });
});
</script>

</body>
</html>
